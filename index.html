<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmad | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { background-color: #030712; color: white; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glow { box-shadow: 0 0 20px rgba(139, 92, 246, 0.3); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { motion } = FramerMotion;

        const App = () => {
            const projects = [
                { title: 'Riovolution Contracting', desc: 'Custom WordPress & construction platform.', tag: 'Web Design' },
                { title: 'Car Marketplace', desc: 'Vehicle documentation and sales portal.', tag: 'Full Stack' },
                { title: 'Public Welfare Foundation', desc: 'Branding and digital presence.', tag: 'Non-Profit' }
            ];

            return (
                <div className="min-h-screen font-sans selection:bg-violet-500/30">
                    {/* Hero Section */}
                    <section className="h-screen flex flex-col justify-center items-center text-center px-4">
                        <motion.div 
                            initial={{ opacity: 0, y: 20 }}
                            animate={{ opacity: 1, y: 0 }}
                            transition={{ duration: 0.8 }}
                        >
                            <h1 className="text-6xl md:text-8xl font-bold tracking-tighter mb-4 bg-gradient-to-r from-white to-gray-500 bg-clip-text text-transparent">
                                Ahmad
                            </h1>
                            <p className="text-xl md:text-2xl text-gray-400 max-w-2xl mx-auto">
                                Front-End Developer crafting high-end digital experiences with modern web technologies.
                            </p>
                        </motion.div>
                        
                        <motion.div 
                            className="absolute bottom-10 animate-bounce text-gray-500"
                            initial={{ opacity: 0 }}
                            animate={{ opacity: 1 }}
                            transition={{ delay: 1 }}
                        >
                            Scroll down
                        </motion.div>
                    </section>

                    {/* Projects Section */}
                    <section className="max-w-6xl mx-auto py-20 px-6">
                        <h2 className="text-3xl font-bold mb-12">Featured Work</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            {projects.map((project, idx) => (
                                <motion.div 
                                    key={idx}
                                    whileHover={{ scale: 1.02 }}
                                    className="glass p-8 rounded-3xl glow group transition-all"
                                >
                                    <span className="text-xs font-mono text-violet-400 uppercase tracking-widest">{project.tag}</span>
                                    <h3 className="text-2xl font-semibold mt-2 mb-4 group-hover:text-violet-400 transition-colors">{project.title}</h3>
                                    <p className="text-gray-400 leading-relaxed">{project.desc}</p>
                                </motion.div>
                            ))}
                        </div>
                    </section>

                    {/* Contact Section */}
                    <section className="py-40 text-center px-6">
                        <div className="glass max-w-4xl mx-auto p-12 rounded-[3rem] border-violet-500/20">
                            <h2 className="text-4xl md:text-5xl font-bold mb-6">Let's build something.</h2>
                            <p className="text-gray-400 mb-8">Currently available for freelance opportunities and full-time roles.</p>
                            <a href="mailto:your-email@example.com" className="inline-block bg-white text-black px-10 py-4 rounded-full font-semibold hover:bg-violet-400 transition-colors">
                                Get In Touch
                            </a>
                        </div>
                    </section>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
