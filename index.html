<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmad | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { background-color: #030712; color: white; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glow-hover:hover { box-shadow: 0 0 20px rgba(139, 92, 246, 0.3); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { motion } = FramerMotion;

        const App = () => {
            const projects = [
                { title: 'Riovolution Contracting', desc: 'Custom construction platform for a US-based firm.', tag: 'Web Design' },
                { title: 'Car Marketplace', desc: 'Marketplace for vehicle documentation and sales in Pakistan.', tag: 'Full Stack' },
                { title: 'Public Welfare Foundation', desc: 'Branding and digital presence for non-profit work.', tag: 'Non-Profit' }
            ];

            return (
                <div className="min-h-screen font-sans selection:bg-violet-500/30">
                    {/* Hero Section */}
                    <section className="h-screen flex flex-col justify-center items-center text-center px-4">
                        <motion.div 
                            initial={{ opacity: 0, y: 30 }}
                            animate={{ opacity: 1, y: 0 }}
                            transition={{ duration: 1 }}
                        >
                            <h1 className="text-6xl md:text-8xl font-bold tracking-tighter mb-4 bg-gradient-to-r from-white via-gray-300 to-gray-600 bg-clip-text text-transparent">
                                Ahmad
                            </h1>
                            <p className="text-xl md:text-2xl text-gray-400 max-w-2xl mx-auto">
                                Front-End Developer crafting modern, high-end digital experiences.
                            </p>
                        </motion.div>
                        
                        <motion.div 
                            className="mt-12 text-gray-500 text-sm tracking-widest uppercase"
                            initial={{ opacity: 0 }}
                            animate={{ opacity: 1 }}
                            transition={{ delay: 1 }}
                        >
                            Explore My Work
                        </motion.div>
                    </section>

                    {/* Projects Section */}
                    <section className="max-w-6xl mx-auto py-24 px-6">
                        <h2 className="text-3xl font-bold mb-16 tracking-tight">Featured Projects</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            {projects.map((project, idx) => (
                                <motion.div 
                                    key={idx}
                                    initial={{ opacity: 0, y: 20 }}
                                    whileInView={{ opacity: 1, y: 0 }}
                                    transition={{ delay: idx * 0.1 }}
                                    whileHover={{ y: -5 }}
                                    className="glass p-8 rounded-[2rem] glow-hover group transition-all duration-500"
                                >
                                    <div className="text-xs font-mono text-violet-400 uppercase tracking-[0.2em] mb-4">{project.tag}</div>
                                    <h3 className="text-2xl font-semibold mb-3 group-hover:text-violet-300 transition-colors">{project.title}</h3>
                                    <p className="text-gray-400 leading-relaxed text-sm">{project.desc}</p>
                                </motion.div>
                            ))}
                        </div>
                    </section>

                    {/* Contact Section */}
                    <section className="py-32 text-center px-6">
                        <motion.div 
                            whileInView={{ scale: [0.95, 1], opacity: [0, 1] }}
                            className="glass max-w-4xl mx-auto p-16 rounded-[3rem] border-violet-500/10"
                        >
                            <h2 className="text-4xl md:text-6xl font-bold mb-8">Ready to start?</h2>
                            <p className="text-gray-400 text-lg mb-10">I'm currently taking on new projects and collaborations.</p>
                            <a href="mailto:contact@ahmad.com" className="inline-block bg-white text-black px-12 py-5 rounded-full font-bold hover:bg-violet-400 hover:text-white transition-all transform hover:scale-105">
                                Send a Message
                            </a>
                        </motion.div>
                    </section>

                    <footer className="py-10 text-center text-gray-600 text-xs tracking-widest uppercase">
                        &copy; 2026 Ahmad • Built with AI
                    </footer>
                </div>
            );
        };

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
    </script>
</body>
</html>
